<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 240" width="100%" height="100%">
  <rect width="240" height="240" fill="#ffffff" />

  <!-- Outer Venn circles (structural) -->
  <g fill="none" stroke="#374151" stroke-width="2.5">
    <circle cx="104" cy="90" r="48" />
    <circle cx="140" cy="96" r="42" />
    <circle cx="116" cy="132" r="52" />
  </g>

  <!-- Inner overlapping circles — equilateral, side ~14 for heavy overlap -->
  <circle cx="120" cy="98" r="14" fill="#FFB000" opacity="0.75" />
  <circle cx="112" cy="112" r="14" fill="#6B7280" opacity="0.70" />
  <circle cx="128" cy="112" r="14" fill="#0D9488" opacity="0.75" />

  <!-- Triple intersection — green accent -->
  <circle cx="120" cy="107" r="7" fill="#10B981" />

  <text x="120" y="215" font-family="system-ui, -apple-system, sans-serif" font-size="26" font-weight="700" fill="#374151" text-anchor="middle" letter-spacing="-0.5">ContextQL</text>
</svg>
